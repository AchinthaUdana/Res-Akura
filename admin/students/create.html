<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student | Akura Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/admin-style.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-wrapper">
                    <div class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                    <span class="logo-text">Akura Admin</span>
                </div>
                <button class="close-sidebar" id="closeSidebar"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="sidebar-menu">
                <a href="../index.html" class="menu-item"><i class="fa-solid fa-chart-pie"></i> <span>Dashboard</span></a>
                <div class="menu-title">Management</div>
                <a href="../students/list.html" class="menu-item active"><i class="fa-solid fa-users"></i> <span>Students</span></a>
                <a href="../batches/list.html" class="menu-item"><i class="fa-solid fa-layer-group"></i> <span>Batches</span></a>
                <a href="../payments/list.html" class="menu-item"><i class="fa-solid fa-file-invoice-dollar"></i> <span>Payments</span></a>
                <div class="menu-title">Academics</div>
                <a href="../lessons/list.html" class="menu-item"><i class="fa-solid fa-video"></i> <span>Lessons</span></a>
                <a href="../notes/list.html" class="menu-item"><i class="fa-solid fa-book"></i> <span>Notes</span></a>
                <a href="../online-papers/list.html" class="menu-item"><i class="fa-solid fa-file-alt"></i> <span>Online Papers</span></a>
                <a href="../exams/list.html" class="menu-item"><i class="fa-solid fa-pen-to-square"></i> <span>Exams</span></a>
                <a href="../marks/list.html" class="menu-item"><i class="fa-solid fa-check-double"></i> <span>Marks</span></a>
                <a href="../rankings/rankings.html" class="menu-item"><i class="fa-solid fa-trophy"></i> <span>Rankings</span></a>
                <div class="menu-title">Extras</div>
                <a href="../reminders/list.html" class="menu-item"><i class="fa-solid fa-bell"></i> <span>Reminders</span></a>
                <a href="../timetable/timetable.html" class="menu-item"><i class="fa-solid fa-calendar-alt"></i> <span>Timetable</span></a>
                <a href="../settings/settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> <span>Settings</span></a>
            </div>
        </aside>

        <main class="main-content">
            <header class="navbar">
                <div class="nav-left">
                    <button id="toggleSidebar" class="toggle-btn"><i class="fa-solid fa-bars"></i></button>
                    <h2 class="page-title">Students</h2>
                </div>
                <div class="nav-right">
                    <div class="nav-item profile-dropdown">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff" alt="Admin" class="profile-img">
                        <div class="profile-info">
                            <span class="admin-name">Admin User</span>
                            <span class="admin-role">Super Admin</span>
                        </div>
                        <i class="fa-solid fa-chevron-down drop-icon"></i>
                        <div class="dropdown-menu">
                            <a href="../login.html" class="logout-btn"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="page-content">
                <div class="section-header">
                    <h2 class="section-title">Add New Student</h2>
                    <a href="list.html" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Back to List</a>
                </div>

                <div class="form-container">
                    <form action="#" method="POST">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" placeholder="Enter student name" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" placeholder="Enter email" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="Enter temporary password" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" placeholder="Confirm password" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Grade (Optional)</label>
                                <select class="form-control">
                                    <option value="">Select Grade</option>
                                    <option value="6">Grade 6</option>
                                    <option value="7">Grade 7</option>
                                    <option value="8">Grade 8</option>
                                    <option value="9">Grade 9</option>
                                    <option value="10">Grade 10</option>
                                    <option value="11">Grade 11</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Batch (Optional)</label>
                                <select class="form-control">
                                    <option value="">Select Batch</option>
                                    <option value="2026 AL">2026 A/L</option>
                                    <option value="2027 AL">2027 A/L</option>
                                    <option value="2024 OL">2024 O/L</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Account Status</label>
                            <select class="form-control">
                                <option value="active">Active</option>
                                <option value="pending">Pending</option>
                                <option value="suspended">Suspended</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">
                            <i class="fa-solid fa-save"></i> Save Student
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/admin-script.js"></script>
</body>
</html>
